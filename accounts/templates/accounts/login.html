{% extends 'base.html' %}
{% block title %}Login | CampusHub{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>Login</h1>
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <p><label>Username:</label> <input type="text" name="username" class="form-control" required></p>
        <p><label>Password:</label> <input type="password" name="password" class="form-control" required></p>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="{% url 'accounts:register' %}">Register</a></p>
    <p class="auth-link"><a href="{% url 'accounts:password_reset' %}">Forgot password?</a></p>
</div>
{% endblock %}
