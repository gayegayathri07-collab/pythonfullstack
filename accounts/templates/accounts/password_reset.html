{% extends 'base.html' %}
{% block title %}Reset Password | CampusHub{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>Reset Password</h1>
    <p>Enter your email and we'll send you a reset link.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>
</div>
{% endblock %}
