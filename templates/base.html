<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <head>
    <meta charset="UTF-8">
    <title>Campus Hub</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

<body>
    {% incl<style>
  #map { 
    height: 400px; 
    width: 100%; 
    border-radius: 12px;
  }
</style>
</head>


    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 CampusHub &mdash; Module 4.3 Django Templates</p>
        <p><a href="https://maps.google.com/?q=13.243372,78.7265317" target="_blank">View on Google Maps</a></p>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  if(document.getElementById('map')) {
    var map = L.map('map').setView([13.2434, 78.7265], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([13.2434, 78.7265]).addTo(map).bindPopup('Mother Theresa Institute of Engineering and Technology');
  }
</script>
</body>
</html>
